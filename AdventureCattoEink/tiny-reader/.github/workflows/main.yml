name: Try to build the sketch and enclosure model

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  actions: write

jobs:
  test-build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: nixbuild/nix-quick-install-action@v30
        with:
          nix_conf: |
            keep-env-derivations = true
            keep-outputs = true
      
      - name: Restore and save Nix store
        uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ hashFiles('**/*.nix', '**/flake.lock') }}
          restore-prefixes-first-match: nix-
          gc-max-store-size-linux: 3G
          purge: true
          purge-prefixes: nix-
          purge-created: 0
          purge-last-accessed: 0
          purge-primary-key: never
        
      - uses: nicknovitski/nix-develop@v1

      - name: Build sketch
        run: arduino-cli compile --verbose --fqbn esp32:esp32:esp32s3
        
      - name: Build enclosure
        run: openscad -o model.stl tiny_reader_2-13_case.scad
